    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>

<body class="bg-slate-50 text-slate-800 overflow-hidden h-screen flex flex-col">

    <!-- Navbar -->
    <div class="bg-slate-900 text-slate-100 px-4 py-2 flex items-center justify-between text-xs sm:text-sm z-50">
        <div class="flex items-center gap-2 font-bold text-emerald-400 uppercase tracking-widest text-[10px]">
            <i class="fa-solid fa-satellite-dish"></i> PetaCAD Web Pro - GIS-to-CAD Engine
        </div>
    </div>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-slate-200 hidden lg:flex flex-col z-40">
            <div class="p-6 border-b border-slate-100 flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white text-xl shadow-lg"><i class="fa-solid fa-layer-group"></i></div>
                <div>
                    <h1 class="font-bold text-slate-900">PetaCAD Web</h1>
                    <p class="text-[10px] text-slate-400">GIS-TO-CAD CONVERTER</p>
                </div>
            </div>
            <nav class="p-4 space-y-1">
                <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-600 rounded-xl text-sm font-semibold"><i class="fa-solid fa-map-location-dot"></i> Peta - CAD Converter</a>
                <a href="#" onclick="openSymbolConfigurator()" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl text-sm font-medium"><i class="fa-solid fa-gear"></i> Library Simbol</a>

        <!-- Main Content -->
        <main class="flex-1 relative h-full">

                <div class="flex items-center justify-between">
                    <h2 class="font-bold text-slate-900">Konfigurasi CAD</h2>

                <div class="grid grid-cols-2 gap-2">

    <!-- Modals & Scripts -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[1000] flex items-center justify-center text-white font-bold">Memproses CAD...</div>
    <div id="successModal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[1000] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl text-center max-w-sm">

            <p class="text-sm text-slate-600 mb-6">File DXF R12 berhasil dibuat.</p>
            <button onclick="document.getElementById('successModal').classList.add('hidden')" class="bg-slate-900 text-white px-6 py-2 rounded-xl">Selesai</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script>
        const map = L.map('map').setView([-6.8915, 107.6106], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
        
        const drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);
        const drawControl = new L.Control.Draw({ edit: { featureGroup: drawnItems }, draw: { polygon: false, polyline: false, circle: false, marker: false, circlemarker: false, rectangle: true } });
        map.addControl(drawControl);

        map.on(L.Draw.Event.CREATED, (e) => { drawnItems.clearLayers(); drawnItems.addLayer(e.layer); updateCoordTexts(e.layer.getBounds()); });

        function updateCoordTexts(bounds) {
            document.getElementById('valNorth').innerText = bounds.getNorth().toFixed(5);
            document.getElementById('valSouth').innerText = bounds.getSouth().toFixed(5);
            document.getElementById('valWest').innerText = bounds.getWest().toFixed(5);
            document.getElementById('valEast').innerText = bounds.getEast().toFixed(5);
        }

        function wgs84ToUtm(lat, lon) {
            const a = 6378137.0; const f = 1.0 / 298.257223563; const b = a * (1.0 - f); const e2 = (a*a - b*b) / (b*b);
            const zone = Math.floor((lon + 180) / 6) + 1; const lon0 = (zone * 6) - 183;
            const latRad = lat * Math.PI / 180; const lonRad = lon * Math.PI / 180; const lon0Rad = lon0 * Math.PI / 180;
            const N = a / Math.sqrt(1.0 - (e2/(1+e2)) * Math.sin(latRad) * Math.sin(latRad));
            const T = Math.tan(latRad) * Math.tan(latRad); const C = e2 * Math.cos(latRad) * Math.cos(latRad);
            const A = (lonRad - lon0Rad) * Math.cos(latRad);
            const M = a * ((1.0 - e2/(4.0+4.0*e2)) * latRad - (3.0*e2/(8.0+8.0*e2)) * Math.sin(2.0*latRad));
            const k0 = 0.9996;
            const easting = 500000.0 + k0 * N * (A + (1.0 - T + C) * A*A*A / 6.0);
            const northing = k0 * (M + N * Math.tan(latRad) * (A*A / 2.0));
            return { x: easting, y: lat < 0 ? northing + 10000000.0 : northing };
        }

        document.getElementById('btnDownload').addEventListener('click', async () => {
            document.getElementById('loadingOverlay').classList.remove('hidden');
            const n = parseFloat(document.getElementById('valNorth').innerText);
            const s = parseFloat(document.getElementById('valSouth').innerText);
            const w = parseFloat(document.getElementById('valWest').innerText);
            const e = parseFloat(document.getElementById('valEast').innerText);

            const overpassQuery = `[out:json];(way["highway"](${s},${w},${n},${e});way["building"](${s},${w},${n},${e}););out geom;`;
            const resp = await fetch("https://overpass-api.de/api/interpreter", { method: "POST", body: "data=" + encodeURIComponent(overpassQuery) });
            const data = await resp.json();

            let dxf = "0\nSECTION\n2\nHEADER\n9\n$ACADVER\n1\nAC1009\n0\nENDSEC\n0\nSECTION\n2\nTABLES\n0\nTABLE\n2\nLAYER\n70\n2\n0\nLAYER\n2\nJALAN\n70\n0\n62\n7\n6\nCONTINUOUS\n0\nLAYER\n2\nBANGUNAN\n70\n0\n62\n1\n6\nCONTINUOUS\n0\nENDTAB\n0\nENDSEC\n0\nSECTION\n2\nENTITIES\n";

            data.elements.forEach(elem => {
                if (elem.type !== "way" || !elem.geometry) return;
                const layer = elem.tags.highway ? "JALAN" : "BANGUNAN";
                const pts = elem.geometry.map(p => wgs84ToUtm(p.lat, p.lon));
                for(let i=0; i<pts.length-1; i++){
                    dxf += `0\nLINE\n8\n${layer}\n10\n${pts[i].x}\n20\n${pts[i].y}\n11\n${pts[i+1].x}\n21\n${pts[i+1].y}\n`;
                }
            });

            dxf += "0\nENDSEC\n0\nEOF\n";
            const blob = new Blob([dxf], { type: 'application/dxf' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'peta.dxf'; a.click();
            document.getElementById('loadingOverlay').classList.add('hidden');
            document.getElementById('successModal').classList.remove('hidden');
        });
    </script>
</body>
</html>
