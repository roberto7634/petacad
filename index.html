<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetaCAD Web Pro - GIS to DXF R12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        #map { height: 100%; z-index: 1; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col">

    <div class="bg-slate-900 text-white p-3 text-sm font-bold flex justify-between">
        <span>PetaCAD Web - R12 Generator (w/ KML Support)</span>
        <span id="status" class="text-emerald-400">Siap</span>
    </div>

    <div class="flex-1 flex overflow-hidden">
        <div id="map" class="flex-1"></div>
        <div class="w-80 bg-white p-6 border-l flex flex-col gap-4 overflow-y-auto">
            <h2 class="font-bold text-lg">Konfigurasi CAD</h2>
            <button id="btnDraw" class="w-full bg-slate-800 text-white py-2 rounded-lg font-bold hover:bg-slate-700">Gambar Area</button>
            <label class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold text-center cursor-pointer hover:bg-blue-700">
                Import KML
                <input type="file" id="kmlInput" class="hidden" accept=".kml">
            </label>
            <div id="kmlStatus" class="text-[10px] text-purple-600 p-2 bg-purple-50 rounded hidden"></div>
            <hr>
            <button id="btnDownload" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-bold hover:bg-emerald-700 transition shadow-lg">Download DXF (R12)</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script>
        const map = L.map('map').setView([-6.8915, 107.6106], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const drawnItems = new L.FeatureGroup().addTo(map);
        new L.Control.Draw({ edit: { featureGroup: drawnItems }, draw: { polygon: false, polyline: false, circle: false, marker: false, rectangle: true } }).addTo(map);

        let kmlData = { points: [], paths: [] };
        let boundingBox = { n: -6.8865, s: -6.8965, w: 107.6056, e: 107.6156 };

        map.on(L.Draw.Event.CREATED, (e) => { drawnItems.clearLayers(); drawnItems.addLayer(e.layer); const b = e.layer.getBounds(); boundingBox = { n: b.getNorth(), s: b.getSouth(), w: b.getWest(), e: b.getEast() }; });

        document.getElementById('kmlInput').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(evt) {
                const xml = new DOMParser().parseFromString(evt.target.result, "text/xml");
                kmlData = { points: [], paths: [] };
                xml.querySelectorAll("Placemark").forEach(pm => {
                    const coords = pm.querySelector("coordinates")?.textContent.trim().split(" ");
                    const name = pm.querySelector("name")?.textContent || "P";
                    if(coords) {
                        const pts = coords.map(c => c.split(",").map(Number));
                        if(pts.length === 1) kmlData.points.push({ lat: pts[0][1], lon: pts[0][0], name });
                        else kmlData.paths.push(pts.map(p => ({lat: p[1], lon: p[0]})));
                    }
                });
                document.getElementById('kmlStatus').classList.remove('hidden');
                document.getElementById('kmlStatus').innerText = `KML: ${kmlData.points.length} Titik, ${kmlData.paths.length} Jalur`;
            };
            reader.readAsText(e.target.files[0]);
        };

        function wgs84ToUtm(lat, lon) {
            const a = 6378137.0; const f = 1.0 / 298.257223563; const e2 = 2*f - f*f;
            const zone = Math.floor((lon + 180) / 6) + 1; const lon0 = (zone * 6) - 183;
            const latRad = lat * Math.PI / 180; const lonRad = lon * Math.PI / 180; const lon0Rad = lon0 * Math.PI / 180;
            const N = a / Math.sqrt(1 - e2 * Math.sin(latRad)**2);
            const T = Math.tan(latRad)**2; const C = e2 * Math.cos(latRad)**2;
            const A = (lonRad - lon0Rad) * Math.cos(latRad);
            const M = a * ((1 - e2/4 - 3*e2**2/64) * latRad - (3*e2/8 + 3*e2**2/32) * Math.sin(2*latRad));
            const k0 = 0.9996;
            return { x: 500000 + k0 * N * (A + (1-T+C)*A**3/6), y: k0 * (M + N * Math.tan(latRad) * (A**2/2)) + (lat < 0 ? 10000000 : 0) };
        }

        document.getElementById('btnDownload').onclick = async () => {
            document.getElementById('status').innerText = "Memproses...";
            const query = `[out:json];(way["highway"](${boundingBox.s},${boundingBox.w},${boundingBox.n},${boundingBox.e});way["building"](${boundingBox.s},${boundingBox.w},${boundingBox.n},${boundingBox.e}););out geom;`;
            const res = await fetch("https://overpass-api.de/api/interpreter", { method: "POST", body: "data=" + encodeURIComponent(query) });
            const data = await res.json();

            // Header R12 + Layer Definition (Include IMPORT_KML)
            let dxf = "0\nSECTION\n2\nHEADER\n9\n$ACADVER\n1\nAC1009\n0\nENDSEC\n0\nSECTION\n2\nTABLES\n0\nTABLE\n2\nLAYER\n70\n3\n0\nLAYER\n2\nJALAN\n70\n0\n62\n7\n6\nCONTINUOUS\n0\nLAYER\n2\nBANGUNAN\n70\n0\n62\n1\n6\nCONTINUOUS\n0\nLAYER\n2\nIMPORT_KML\n70\n0\n62\n6\n6\nCONTINUOUS\n0\nENDTAB\n0\nENDSEC\n0\nSECTION\n2\nENTITIES\n";

            // Draw OSM Data
            data.elements.forEach(el => {
                if(!el.geometry) return;
                const layer = el.tags.highway ? "JALAN" : "BANGUNAN";
                const pts = el.geometry.map(p => wgs84ToUtm(p.lat, p.lon));
                for(let i=0; i<pts.length-1; i++) dxf += `0\nLINE\n8\n${layer}\n10\n${pts[i].x}\n20\n${pts[i].y}\n11\n${pts[i+1].x}\n21\n${pts[i+1].y}\n`;
            });

            // Draw KML Paths
            kmlData.paths.forEach(path => {
                const pts = path.map(p => wgs84ToUtm(p.lat, p.lon));
                for(let i=0; i<pts.length-1; i++) dxf += `0\nLINE\n8\nIMPORT_KML\n10\n${pts[i].x}\n20\n${pts[i].y}\n11\n${pts[i+1].x}\n21\n${pts[i+1].y}\n`;
            });

            // Draw KML Points
            kmlData.points.forEach(pt => {
                const utm = wgs84ToUtm(pt.lat, pt.lon);
                dxf += `0\nCIRCLE\n8\nIMPORT_KML\n10\n${utm.x}\n20\n${utm.y}\n40\n1.5\n0\nTEXT\n8\nIMPORT_KML\n10\n${utm.x+2}\n20\n${utm.y+2}\n40\n2.0\n1\n${pt.name}\n`;
            });

            dxf += "0\nENDSEC\n0\nEOF\n";
            const blob = new Blob([dxf.replace(/\n/g, "\r\n")], { type: 'application/dxf' });
            const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = 'PetaCAD_Output.dxf'; link.click();
            document.getElementById('status').innerText = "Sukses!";
        };
    </script>
</body>
</html>
